name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        gpu:
          - name: gtx750ti
            value: "NVIDIA GeForce GTX 750 Ti"
          - name: gtx1030
            value: "NVIDIA GeForce GTX 1030"
          - name: gtx1050ti
            value: "NVIDIA GeForce GTX 1050 Ti"
          - name: rtx4090
            value: "NVIDIA GeForce RTX 4090"
          - name: rtx5090
            value: "NVIDIA GeForce RTX 5090"
          - name: rx580
            value: "AMD Radeon RX 580"
          - name: rx9070xt
            value: "AMD Radeon RX 9070 XT"
        features:
          - name: release
            flags: ""
          - name: release-debug-log
            flags: "--features debug-log"
    env:
      FAKE_GPU_NAME: ${{ matrix.gpu.value }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.gpu.name }}

      - name: Build all DLLs (${{ matrix.gpu.name }} / ${{ matrix.features.name }})
        run: |
          cargo build --release -p faker-dxgi ${{ matrix.features.flags }}
          cargo build --release -p faker-d3d11 ${{ matrix.features.flags }}
          cargo build --release -p faker-d3d12 ${{ matrix.features.flags }}
          cargo build --release -p faker-dxvk ${{ matrix.features.flags }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dlls-${{ matrix.gpu.name }}-${{ matrix.features.name }}
          path: |
            target/release/dxgi.dll
            target/release/d3d11.dll
            target/release/d3d12.dll
            target/release/dxvk.dll

  release:
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get short commit hash
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets and manifest
        shell: bash
        run: |
          mkdir -p release
          manifest='[]'

          for dir in artifacts/dlls-*/; do
            dirname=$(basename "$dir")

            # Parse gpu and features from dirname: dlls-{gpu}-{features}
            gpu=$(echo "$dirname" | sed 's/^dlls-//;s/-release.*$//')
            features=$(echo "$dirname" | sed 's/^dlls-[^-]*-//')

            for dll_name in dxgi d3d11 d3d12 dxvk; do
              dll_path="$dir/${dll_name}.dll"
              if [ ! -f "$dll_path" ]; then
                continue
              fi

              dll_hash=$(sha256sum "$dll_path" | cut -d' ' -f1)
              dll_size=$(stat -c%s "$dll_path")
              asset_name="${dll_name}-${gpu}-${features}"

              cp "$dll_path" "release/${asset_name}.dll"

              entry=$(jq -n \
                --arg name "$asset_name" \
                --arg dll "$dll_name" \
                --arg gpu "$gpu" \
                --arg features "$features" \
                --arg sha256 "$dll_hash" \
                --argjson size "$dll_size" \
                '{
                  name: $name,
                  dll: $dll,
                  gpu: $gpu,
                  features: $features,
                  file: ($name + ".dll"),
                  sha256: $sha256,
                  size: $size
                }')

              manifest=$(echo "$manifest" | jq --argjson entry "$entry" '. + [$entry]')
            done
          done

          echo "$manifest" | jq '.' > release/manifest.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.vars.outputs.short_sha }}
          name: Build ${{ steps.vars.outputs.short_sha }}
          body: |
            Automated build from commit ${{ github.sha }}

            See `manifest.json` for file details and checksums.
          files: release/*
